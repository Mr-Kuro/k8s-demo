apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:latest
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongodb-root-username
        - name: MONGO_INITDB_ROOT_PASSWORD
          # the value of the environment variable is obtained from the secret.
          # the secret is referenced by its name and the key that contains the value.
          # this is the recommended way to use secrets in Kubernetes, as it allows you to keep sensitive information out of your deployment manifests and manage it separately.
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongodb-root-password